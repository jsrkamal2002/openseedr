---
# ── Deployment ──────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openseedr-api
  namespace: openseedr
  labels:
    app: openseedr-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: openseedr-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: openseedr-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: openseedr/api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: openseedr-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openseedr-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: openseedr-secrets
                  key: JWT_SECRET
            - name: QBITTORRENT_PASS
              valueFrom:
                secretKeyRef:
                  name: openseedr-secrets
                  key: QBT_PASS
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: openseedr-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: openseedr-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: openseedr-secrets
                  key: GITHUB_CLIENT_ID
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: openseedr-secrets
                  key: GITHUB_CLIENT_SECRET
          volumeMounts:
            - name: torrent-data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
      volumes:
        - name: torrent-data
          persistentVolumeClaim:
            claimName: torrent-data-pvc

---
# ── Service ──────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: openseedr-api
  namespace: openseedr
spec:
  selector:
    app: openseedr-api
  ports:
    - port: 8080
      targetPort: 8080

---
# ── HPA ──────────────────────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: openseedr-api
  namespace: openseedr
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: openseedr-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
