apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openseedr
  namespace: openseedr
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    # Enable buffering off for large downloads
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - yourdomain.com
      secretName: openseedr-tls
  rules:
    - host: yourdomain.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: openseedr-api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openseedr-frontend
                port:
                  number: 8080
