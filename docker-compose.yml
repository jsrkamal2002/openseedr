name: openseedr

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-openseedr}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-openseedr}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-openseedr}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [backend]

  # ── qBittorrent ─────────────────────────────────────────────────────────────
  qbittorrent:
    build:
      context: ./qbittorrent       # includes Dockerfile + docker-entrypoint.sh
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      QBT_WEBUI_PORT: "8080"
      QBT_WEBUI_USER: ${QBT_USER:-admin}
      QBT_WEBUI_PASS: ${QBT_PASS:?QBT_PASS is required}
    volumes:
      - qbt_config:/config
      - torrent_data:/data          # shared with api
    ports:
      - "6881:6881"
      - "6881:6881/udp"
    networks: [backend]

  # ── Go API ───────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qbittorrent:
        condition: service_started
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_VERSION: "0.1.0"
      PORT: "8080"

      # Database
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-openseedr}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ${DB_NAME:-openseedr}

      # JWT
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}

      # OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL:-http://localhost/api/v1/auth/google/callback}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URL: ${GITHUB_REDIRECT_URL:-http://localhost/api/v1/auth/github/callback}

      # qBittorrent
      QBITTORRENT_URL: http://qbittorrent:8080
      QBITTORRENT_USER: ${QBT_USER:-admin}
      QBITTORRENT_PASS: ${QBT_PASS:?QBT_PASS is required}

      # Storage
      STORAGE_PATH: /data

      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}

      # OTel
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      # Required by Go's user.Current() when CGO is disabled (scratch image)
      USER: openseedr
    volumes:
      - torrent_data:/data
    networks: [backend, frontend]
    read_only: true
    tmpfs:
      - /tmp

  # ── Vue Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks: [frontend]

  # ── Nginx reverse proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on: [api, frontend]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks: [frontend]

  # ── OTel Collector ────────────────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    restart: unless-stopped
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector/config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics scrape
    networks: [backend, observability]

  # ── Jaeger (tracing UI) ───────────────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.58
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
    networks: [observability]

  # ── Prometheus ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9092:9090"
    networks: [observability]

  # ── Loki (log aggregation) ─────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.1.0
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    networks: [observability]

  # ── Grafana (dashboards) ──────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on: [prometheus, loki, jaeger]
    networks: [observability]

networks:
  backend:
  frontend:
  observability:

volumes:
  postgres_data:
  qbt_config:
  torrent_data:
  prometheus_data:
  loki_data:
  grafana_data:
