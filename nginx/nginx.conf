events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Security
    server_tokens off;
    client_max_body_size 20m;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    upstream api     { server api:8080; }
    upstream frontend { server frontend:8080; }

    server {
        listen 80;
        server_name _;

        # API proxy (non-download routes)
        location /api/ {
            proxy_pass         http://api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_buffering    on;
        }

        # File download — no buffering, no timeouts so transfers of any size work.
        # proxy_read_timeout: between-read timeout from the upstream (Go API).
        # proxy_send_timeout: between-write timeout to the browser.
        # Both are set to a large value so multi-GB downloads over slow connections
        # complete without nginx killing the connection mid-transfer.
        location /api/v1/files/download {
            proxy_pass         http://api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering    off;
            proxy_read_timeout 24h;
            proxy_send_timeout 24h;
        }

        # Frontend SPA
        location / {
            proxy_pass       http://frontend;
            proxy_set_header Host $host;
        }
    }
}
