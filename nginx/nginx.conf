events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Security
    server_tokens off;
    client_max_body_size 20m;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css application/wasm;
    gzip_min_length 1024;

    upstream api      { server api:8080; }
    upstream frontend { server frontend:8080; }

    server {
        listen 80;
        server_name _;

        # ── Security headers ─────────────────────────────────────────────────
        # X-Content-Type-Options is also set in the Go API for API responses;
        # this covers the static frontend assets served by nginx.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # Restrict browser features the app does not use.
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ── API proxy (non-download routes) ──────────────────────────────────
        location /api/ {
            proxy_pass         http://api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_buffering    on;
        }

        # ── File download — no buffering, generous timeouts ──────────────────
        # proxy_read_timeout: between-read timeout from the upstream Go API.
        # proxy_send_timeout: between-write timeout to the browser.
        # Both are large so multi-GB downloads over slow connections complete.
        location /api/v1/files/download {
            proxy_pass         http://api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering    off;
            proxy_read_timeout 24h;
            proxy_send_timeout 24h;
        }

        # ── Frontend SPA ─────────────────────────────────────────────────────
        location / {
            proxy_pass       http://frontend;
            proxy_set_header Host $host;
            # Return index.html for all unknown paths so Vue Router works.
            proxy_intercept_errors on;
            error_page 404 = /index.html;
        }
    }
}
